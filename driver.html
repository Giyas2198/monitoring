<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JO-TRANS - Stage Scanner Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- CORE FIREBASE SDK (V8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-gray-900 p-4 text-center border-b border-gray-800 shadow-md">
        <h1 class="text-md font-bold tracking-widest text-blue-400">📲 STAGE SCANNER PORTAL</h1>
        <p class="text-[11px] text-gray-500 mt-0.5">Automated Time Stamp by Stage Area Location</p>
    </header>

    <!-- Main Content -->
    <main class="p-4 flex-1 flex flex-col items-center justify-center max-w-md mx-auto w-full space-y-4">
        
        <!-- Live Clock Info -->
        <div class="text-center">
            <span id="live-clock" class="bg-gray-800 text-emerald-400 text-xs px-3 py-1.5 rounded-full font-mono border border-gray-700">
                Memuat Jam Lokal HP...
            </span>
        </div>

        <!-- STEP 1: Pilih Stage Area -->
        <div class="w-full bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-lg space-y-3">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">1. Pilih / Tentukan Nomor Stage Lapangan</label>
                <select id="select-stage" onchange="toggleManualStage()" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-sm font-bold text-yellow-400 focus:outline-none focus:border-blue-500">
                    <option value="">-- PILIH NOMOR STAGE --</option>
                    <option value="35">STAGE 35</option>
                    <option value="37">STAGE 37</option>
                    <option value="MANUAL_INPUT">INPUT STAGE MANUAL</option>
                </select>
            </div>

            <!-- Hidden Input Box untuk Stage Manual jika tidak ada di list -->
            <div id="manual-stage-container" class="hidden">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Ketik Nomor Stage Manual</label>
                <input type="text" id="input-stage-manual" placeholder="Masukkan nomor stage..." 
                       class="w-full p-3 bg-gray-800 border border-orange-500/50 rounded-lg text-sm font-bold uppercase text-orange-400 focus:outline-none focus:border-orange-500">
            </div>
        </div>

        <!-- STEP 2: Kamera Scanner -->
        <div class="w-full bg-gray-900 p-3 rounded-xl border border-gray-800 shadow-lg flex flex-col items-center">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 w-full text-left">2. Bidik Kamera ke Barcode Checkpoint (Gate In / Muat / Selesai / Out)</label>
            <div id="reader" class="w-full bg-black rounded-lg overflow-hidden" style="max-width: 340px;"></div>
            <div id="scan-status" class="mt-3 text-xs font-medium text-gray-500 italic text-center animate-pulse">
                Menghubungkan kamera...
            </div>
        </div>

        <!-- Toast Notification Panel -->
        <div id="toast-msg" class="hidden w-full p-4 rounded-xl text-center font-bold text-sm shadow-lg transition-all duration-300"></div>

    </main>

    <footer class="bg-gray-900 p-2 text-center text-[10px] text-gray-600 border-t border-gray-800">
        JO-TRANS Automated Yard System v6.6
    </footer>

    <script>
        // FIREBASE CONFIGURATION (PASTIKAN CONFIG INI SAMA DENGAN DI APP.JS)
        const firebaseConfig = {
            apiKey: "AIzaSyYourRealApiKeyHere_xxxxxxxx",
            authDomain: "jo-trans-project.firebaseapp.com",
            databaseURL: "https://jo-trans-project-default-rtdb.firebaseio.com", 
            projectId: "jo-trans-project",
            storageBucket: "jo-trans-project.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:123456:web:abcd1234"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const scanStatusText = document.getElementById('scan-status');
        const toastMsg = document.getElementById('toast-msg');
        const liveClock = document.getElementById('live-clock');
        const selectStage = document.getElementById('select-stage');
        const manualStageContainer = document.getElementById('manual-stage-container');
        const inputStageManual = document.getElementById('input-stage-manual');

        setInterval(() => {
            const now = new Date();
            liveClock.innerText = `Waktu HP: ${now.toLocaleDateString()} | ${now.toLocaleTimeString()}`;
        }, 1000);

        function toggleManualStage() {
            if (selectStage.value === "MANUAL_INPUT") {
                manualStageContainer.classList.remove('hidden');
                inputStageManual.focus();
            } else {
                manualStageContainer.classList.add('hidden');
                inputStageManual.value = "";
            }
        }

        function showToast(message, isSuccess) {
            toastMsg.innerText = message;
            toastMsg.classList.remove('hidden', 'bg-emerald-600', 'bg-rose-600');
            toastMsg.classList.add(isSuccess ? 'bg-emerald-600' : 'bg-rose-600');
            setTimeout(() => { toastMsg.classList.add('hidden'); }, 5000);
        }

        // ENGINE SINKRONISASI MASSAL BERDASARKAN NOMOR STAGE
        function processStageScan(scannedPos) {
            let finalStageName = selectStage.value;
            if (finalStageName === "MANUAL_INPUT") {
                finalStageName = inputStageManual.value.trim();
            }

            if (!finalStageName) {
                showToast("⚠️ ERROR: Silakan tentukan nomor Stage terlebih dahulu!", false);
                return;
            }

            const validPositions = ["Gate In", "Proses Muat", "Selesai Muat", "Gate Out"];
            if (!validPositions.includes(scannedPos)) {
                showToast(`⚠️ ERROR: Barcode Checkpoint Tidak Valid! Terbaca: "${scannedPos}"`, false);
                return;
            }

            const now = new Date();
            const timeStampString = `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
            const isoString = now.toISOString();

            const localDateStr = now.getFullYear() + '-' + 
                                 String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                                 String(now.getDate()).padStart(2, '0');

            // Ambil snapshot node tanggal aktif dari Firebase cloud
            const dbRef = db.ref(`jotrans_data/${localDateStr}`);
            dbRef.once('value').then((snapshot) => {
                let appData = snapshot.val();
                if (!appData) {
                    showToast(`⚠️ WARNING: Data cloud tanggal [${localDateStr}] kosong. Silakan upload & save CSV dulu di dashboard kantor!`, false);
                    return;
                }

                let updatedCount = 0;
                
                // Iterasi data di Firebase dan update massal yang nomor Stage-nya sama dengan input HP
                Object.keys(appData).forEach(key => {
                    if (String(appData[key].stage).trim() === finalStageName.trim()) {
                        appData[key].status = scannedPos;
                        appData[key].last_scan_time = timeStampString;
                        
                        if (scannedPos === 'Gate In') appData[key].time_gatein = isoString;
                        if (scannedPos === 'Proses Muat') appData[key].time_prosesmuat = isoString;
                        if (scannedPos === 'Selesai Muat') appData[key].time_selesaimuat = isoString;
                        if (scannedPos === 'Gate Out') appData[key].time_gateout = isoString;

                        updatedCount++;
                    }
                });

                if (updatedCount === 0) {
                    showToast(`ℹ️ Scan Sukses, namun tidak ada antrian order aktif di Stage [${finalStageName}] untuk hari ini.`, false);
                    return;
                }

                // Kirim pembaruan kembali ke Firebase node secara massal
                dbRef.update(appData).then(() => {
                    showToast(`✅ BERHASIL UPDATE! Stage [${finalStageName}] sebanyak ${updatedCount} Order otomatis berubah ke [${scannedPos}]`, true);
                });
            }).catch(err => {
                console.error(err);
                showToast("❌ Gagal mengirim pembaruan status ke cloud Firebase.", false);
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            html5QrcodeScanner.clear();
            processStageScan(decodedText.trim());
            setTimeout(() => { startScanner(); }, 3000);
        }

        let html5QrcodeScanner;
        function startScanner() {
            scanStatusText.innerText = "📷 Kamera Siap. Pindai Barcode Nama Pos Checkpoint.";
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true
            }, false);
            html5QrcodeScanner.render(onScanSuccess, (err) => {});
        }

        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
