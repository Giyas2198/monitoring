<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JO-TRANS - Smart Scanner Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-gray-900 p-4 text-center border-b border-gray-800 shadow-md">
        <h1 class="text-md font-bold tracking-widest text-blue-400">📲 VENDOR SCANNER PORTAL</h1>
        <p class="text-[11px] text-gray-500 mt-0.5">Automated Time Stamp & Multi-Filter Input</p>
    </header>

    <!-- Main Content -->
    <main class="p-4 flex-1 flex flex-col items-center justify-center max-w-md mx-auto w-full space-y-4">
        
        <!-- Live Clock Info -->
        <div class="text-center">
            <span id="live-clock" class="bg-gray-800 text-emerald-400 text-xs px-3 py-1.5 rounded-full font-mono border border-gray-700">
                Memuat Jam Lokal HP...
            </span>
        </div>

        <!-- STEP 1: Filter Pengiriman (Ekspedisi & Stage) -->
        <div class="w-full bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-lg space-y-3">
            
            <!-- Input Ekspedisi -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">1. Pilih Nama Ekspedisi / Transporter</label>
                <select id="select-vendor" onchange="toggleManualInput()" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-sm font-bold text-yellow-400 focus:outline-none focus:border-blue-500">
                    <option value="">-- PILIH EKSPEDISI --</option>
                    <option value="ELTRANS">ELTRANS</option>
                    <option value="ABELLE BENEDIT SEJAHTERA (ABS)">ABELLE BENEDIT SEJAHTERA (ABS)</option>
                    <option value="PT WIRA TRANS MANDIRI-">PT WIRA TRANS MANDIRI-</option>
                    <option value="MAERSK">MAERSK</option>
                    <option value="PT MATIO MULA JAYA-">PT MATIO MULA JAYA-</option>
                    <option value="PT. HUMALA GIAT MANDIRI">PT. HUMALA GIAT MANDIRI</option>
                    <option value="PT RESWARA PRIMA EXPRESS">PT RESWARA PRIMA EXPRESS</option>
                    <option value="MANUAL_INPUT">LAINNYA (INPUT MANUAL)</option>
                </select>
            </div>

            <!-- Hidden Input Box untuk Ekspedisi Manual -->
            <div id="manual-vendor-container" class="hidden">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Ketik Nama Ekspedisi Baru</label>
                <input type="text" id="input-vendor-manual" placeholder="Masukkan nama ekspedisi..." 
                       class="w-full p-3 bg-gray-800 border border-orange-500/50 rounded-lg text-sm font-bold uppercase text-orange-400 focus:outline-none focus:border-orange-500">
            </div>

            <!-- BARU! Input Stage Number -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">2. Nomor Stage (Opsional)</label>
                <input type="number" id="input-stage-number" placeholder="Contoh: 35 (Kosongkan jika semua stage)" 
                       class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-sm font-bold text-blue-400 focus:outline-none focus:border-blue-500">
                <p class="text-[10px] text-gray-500 mt-1 italic">*Kosongkan jika ingin meng-update semua nomor stage sekaligus.</p>
            </div>
        </div>

        <!-- STEP 2: Kamera Box -->
        <div class="w-full bg-gray-900 p-3 rounded-xl border border-gray-800 shadow-lg flex flex-col items-center">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 w-full text-left">3. Scan Barcode Pos Gudang / Security</label>
            <div id="reader" class="w-full bg-black rounded-lg overflow-hidden" style="max-width: 340px;"></div>
            <div id="scan-status" class="mt-3 text-xs font-medium text-gray-500 italic text-center animate-pulse">
                Menghubungkan kamera...
            </div>
        </div>

        <!-- Toast Notification Panel -->
        <div id="toast-msg" class="hidden w-full p-4 rounded-xl text-center font-bold text-sm shadow-lg transition-all duration-300"></div>

    </main>

    <footer class="bg-gray-900 p-2 text-center text-[10px] text-gray-600 border-t border-gray-800">
        JO-TRANS Automated Yard System v6.5
    </footer>

    <script>
        const scanStatusText = document.getElementById('scan-status');
        const toastMsg = document.getElementById('toast-msg');
        const liveClock = document.getElementById('live-clock');
        const selectVendor = document.getElementById('select-vendor');
        const manualVendorContainer = document.getElementById('manual-vendor-container');
        const inputVendorManual = document.getElementById('input-vendor-manual');
        const inputStageNumber = document.getElementById('input-stage-number');

        // Jam Digital Real-time di Layar HP
        setInterval(() => {
            const now = new Date();
            liveClock.innerText = `Waktu HP: ${now.toLocaleDateString()} | ${now.toLocaleTimeString()}`;
        }, 1000);

        function toggleManualInput() {
            if (selectVendor.value === "MANUAL_INPUT") {
                manualVendorContainer.classList.remove('hidden');
                inputVendorManual.focus();
            } else {
                manualVendorContainer.classList.add('hidden');
                inputVendorManual.value = "";
            }
        }

        function showToast(message, isSuccess) {
            toastMsg.innerText = message;
            toastMsg.classList.remove('hidden', 'bg-emerald-600', 'bg-rose-600');
            toastMsg.classList.add(isSuccess ? 'bg-emerald-600' : 'bg-rose-600');
            setTimeout(() => { toastMsg.classList.add('hidden'); }, 6000);
        }

        // ENGINE SCAN UTAMA WITH TIME STAMP & STAGE FILTER
        function processSmartScan(scannedPos) {
            // 1. Tentukan nama vendor yang dipakai
            let finalVendorName = selectVendor.value;
            if (finalVendorName === "MANUAL_INPUT") {
                finalVendorName = inputVendorManual.value.trim().toUpperCase();
            }

            if (!finalVendorName) {
                showToast("⚠️ ERROR: Silakan pilih atau ketik nama ekspedisi terlebih dahulu!", false);
                return;
            }

            // 2. Ambil nilai Stage Number (jika diisi)
            const targetedStage = inputStageNumber.value.trim();

            const validPositions = ["Gate In", "Proses Muat", "Selesai Muat", "Gate Out"];
            if (!validPositions.includes(scannedPos)) {
                showToast(`⚠️ ERROR: Barcode tidak valid! Terbaca: "${scannedPos}"`, false);
                return;
            }

            const now = new Date();
            const timeStampString = `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;

            let appData = JSON.parse(localStorage.getItem('jotrans_data')) || [];

            if (appData.length === 0) {
                showToast("⚠️ WARNING: Data dashboard kosong. Silakan upload file CSV terlebih dahulu!", false);
                return;
            }

            // 3. Update massal dengan filter Vendor + Stage
            let updatedCount = 0;
            appData = appData.map(item => {
                const matchVendor = item.transporter.toUpperCase() === finalVendorName.toUpperCase();
                
                // Jika targetedStage diisi, pastikan string/angka stage di item sama.
                // Jika targetedStage kosong, loloskan semua stage untuk vendor tersebut.
                const matchStage = targetedStage === "" || String(item.stage).trim() === targetedStage;

                if (matchVendor && matchStage) {
                    item.status = scannedPos;
                    item.last_scan_time = timeStampString;
                    updatedCount++;
                }
                return item;
            });

            if (updatedCount === 0) {
                let msg = `ℹ️ Scan Sukses, tapi data tidak ditemukan untuk ekspedisi [${finalVendorName}]`;
                if (targetedStage !== "") msg += ` dengan Stage [${targetedStage}]`;
                showToast(msg, false);
                return;
            }

            localStorage.setItem('jotrans_data', JSON.stringify(appData));
            
            let successMsg = `✅ BERHASIL! Rombongan [${finalVendorName}]`;
            if (targetedStage !== "") successMsg += ` Stage [${targetedStage}]`;
            successMsg += ` sebanyak ${updatedCount} Order diupdate ke [${scannedPos}]`;
            
            showToast(successMsg, true);
        }

        // CAMERA CONTROL
        function onScanSuccess(decodedText, decodedResult) {
            html5QrcodeScanner.clear();
            processSmartScan(decodedText.trim());
            setTimeout(() => { startScanner(); }, 4000);
        }

        let html5QrcodeScanner;
        function startScanner() {
            scanStatusText.innerText = "📷 Kamera Siap. Arahkan ke Barcode Pos.";
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true
            }, false);
            html5QrcodeScanner.render(onScanSuccess, (err) => {});
        }

        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
