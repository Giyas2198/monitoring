<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JO-TRANS - Stage Scanner Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-gray-900 p-4 text-center border-b border-gray-800 shadow-md">
        <h1 class="text-md font-bold tracking-widest text-blue-400">📲 STAGE SCANNER PORTAL</h1>
        <p class="text-[11px] text-gray-500 mt-0.5">Automated Time Stamp by Stage Area Location</p>
    </header>

    <main class="p-4 flex-1 flex flex-col items-center justify-center max-w-md mx-auto w-full space-y-4">
        
        <div class="text-center">
            <span id="live-clock" class="bg-gray-800 text-emerald-400 text-xs px-3 py-1.5 rounded-full font-mono border border-gray-700">
                Memuat Jam Lokal HP...
            </span>
        </div>

        <div class="w-full bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-lg space-y-3">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Pilih Pos Checkpoint Anda Sekarang</label>
                <select id="driver-checkpoint" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-sm font-bold text-emerald-400 focus:outline-none focus:border-blue-500">
                    <option value="Gate In">1. Pos Security - Gate In</option>
                    <option value="Proses Muat">2. Loket Gudang - Proses Muat</option>
                    <option value="Selesai Muat">3. Loket Gudang - Selesai Muat</option>
                    <option value="Gate Out">4. Pos Security - Gate Out</option>
                </select>
            </div>
        </div>

        <div class="w-full bg-gray-900 p-3 rounded-xl border border-gray-800 shadow-lg flex flex-col items-center">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 w-full text-left">Scan QR Code Order ID Dari Monitor Utama</label>
            <div id="reader" class="w-full bg-black rounded-lg overflow-hidden" style="max-width: 340px;"></div>
            <div id="scan-status" class="mt-3 text-xs font-medium text-gray-500 italic text-center animate-pulse">
                Menghubungkan kamera...
            </div>
        </div>

        <div id="toast-msg" class="hidden w-full p-4 rounded-xl text-center font-bold text-sm shadow-lg transition-all duration-300"></div>

    </main>

    <footer class="bg-gray-900 p-2 text-center text-[10px] text-gray-600 border-t border-gray-800">
        JO-TRANS Automated Yard System v6.6
    </footer>

    <script>
        // FIREBASE CONFIGURATION (PASTIKAN CONFIG INI SAMA DENGAN DI APP.JS)
        const firebaseConfig = {
            apiKey: "AIzaSyYourRealApiKeyHere_xxxxxxxx",
            authDomain: "jo-trans-project.firebaseapp.com",
            databaseURL: "https://jo-trans-project-default-rtdb.firebaseio.com", 
            projectId: "jo-trans-project",
            storageBucket: "jo-trans-project.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:123456:web:abcd1234"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const scanStatusText = document.getElementById('scan-status');
        const toastMsg = document.getElementById('toast-msg');
        const liveClock = document.getElementById('live-clock');
        const driverCheckpoint = document.getElementById('driver-checkpoint');

        setInterval(() => {
            const now = new Date();
            liveClock.innerText = `Waktu HP: ${now.toLocaleDateString()} | ${now.toLocaleTimeString()}`;
        }, 1000);

        function showToast(message, isSuccess) {
            toastMsg.innerText = message;
            toastMsg.classList.remove('hidden', 'bg-emerald-600', 'bg-rose-600');
            toastMsg.classList.add(isSuccess ? 'bg-emerald-600' : 'bg-rose-600');
            setTimeout(() => { toastMsg.classList.add('hidden'); }, 5000);
        }

        // FUNGSI UTAMA SINKRONISASI UPDATE JIKA SCAN QR TERPENCIL BERHASIL
        function processDriverScan(scannedOrderId) {
            const currentPos = driverCheckpoint.value;
            const now = new Date();
            const timeStampString = `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
            const isoString = now.toISOString();

            const localDateStr = now.getFullYear() + '-' + 
                                 String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                                 String(now.getDate()).padStart(2, '0');

            // Bersihkan key ilegal dari Order ID hasil scan untuk mencari di database
            const targetFirebaseKey = scannedOrderId.trim().toUpperCase().replace(/[.#$\[\]]/g, "_");

            const dbRef = db.ref(`jotrans_data/${localDateStr}/${targetFirebaseKey}`);
            
            // Cek apakah data spesifik Order ID tersebut terdaftar di Firebase untuk hari ini
            dbRef.once('value').then((snapshot) => {
                let orderData = snapshot.val();
                if (!orderData) {
                    showToast(`⚠️ ERROR: Order ID [${scannedOrderId}] tidak valid atau belum di-upload/save pada hari ini (${localDateStr}).`, false);
                    return;
                }

                // Modifikasi status tracking & timestamp lokasi secara presisi
                let updates = {};
                updates['status'] = currentPos;
                updates['last_scan_time'] = timeStampString;
                
                if (currentPos === 'Gate In') updates['time_gatein'] = isoString;
                if (currentPos === 'Proses Muat') updates['time_prosesmuat'] = isoString;
                if (currentPos === 'Selesai Muat') updates['time_selesaimuat'] = isoString;
                if (currentPos === 'Gate Out') updates['time_gateout'] = isoString;

                // Tembak update perubahan langsung ke Firebase Node spesifik
                dbRef.update(updates).then(() => {
                    showToast(`✅ BERHASIL SINKRON CLOUD! Order [${scannedOrderId}] di-update ke status [${currentPos}]`, true);
                });
            }).catch(err => {
                console.error(err);
                showToast("❌ Hubungan koneksi ke cloud Firebase terputus.", false);
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            html5QrcodeScanner.clear();
            processDriverScan(decodedText.trim());
            // Delay 3 detik lalu aktifkan kamera kembali secara otomatis
            setTimeout(() => { startScanner(); }, 3000);
        }

        let html5QrcodeScanner;
        function startScanner() {
            scanStatusText.innerText = "📷 Kamera Aktif. Arahkan ke QR Monitor Utama.";
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true
            }, false);
            html5QrcodeScanner.render(onScanSuccess, (err) => {});
        }

        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
